<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
    background:#020617;
    color:white;
    text-align:center;
    font-family:Arial;
}
.box {
    background:#1e293b;
    padding:25px;
    margin:60px auto;
    width:90%;
    max-width:320px;
    border-radius:15px;
}
input {
    padding:10px;
    width:90%;
    margin:10px;
    border:none;
    border-radius:5px;
}
button {
    padding:10px 20px;
    background:#22c55e;
    border:none;
    border-radius:5px;
    color:white;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="box">

<h2>⚙️ ADMIN PANEL</h2>

<input type="text" id="apk" placeholder="https://t.me/+_2DzGrWFGXU5NmNl">
<input type="text" id="video" placeholder="Enter YouTube Video ID">

<button onclick="saveData()">SAVE</button>

<p id="msg"></p>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig = {
  apiKey: "AIzaSyCMNr0GmJNf1-6tmODKR18mfrE-Nyy4YfI",
  authDomain: "hacker-xaman.firebaseapp.com",
  databaseURL: "https://hacker-xaman-default-rtdb.firebaseio.com",
  projectId: "hacker-xaman",
};

firebase.initializeApp(firebaseConfig);

function saveData(){
    var apk = document.getElementById("apk").value;
    var video = document.getElementById("video").value;

    firebase.database().ref("app").set({
        apk: apk,
        video: video
    });

    document.getElementById("msg").innerHTML="✅ Saved!";
}

</script>

</body>
</html>
