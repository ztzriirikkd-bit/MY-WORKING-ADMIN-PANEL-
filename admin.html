<!DOCTYPE html>
<html>
<head>
  <title>HACKER TEAM OFC ADMIN</title>
</head>
<body style="background:#0f172a;color:white;text-align:center;font-family:Arial">

<h1>⚡ HACKER TEAM OFC ADMIN ⚡</h1>

<input id="apk" placeholder="Enter APK Link" style="padding:10px;width:80%"><br><br>
<input id="video" placeholder="Enter YouTube Video ID" style="padding:10px;width:80%"><br><br>

<button onclick="saveData()" style="padding:10px 20px;background:green;color:white;border:none">
SAVE DATA
</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUMMYKEY123456",
  authDomain: "hacker-xaman.firebaseapp.com",
  databaseURL: "https://hacker-xaman-default-rtdb.firebaseio.com",
  projectId: "hacker-xaman"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveData = function() {
  const apk = document.getElementById("apk").value;
  const video = document.getElementById("video").value;

  set(ref(db, "app"), {
    apk: apk,
    video: video
  }).then(() => {
    alert("✅ Saved Successfully");
  });
}
</script>

</body>
</html>
